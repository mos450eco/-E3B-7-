        const pageKeys = Object.keys(diaryData);
        let currentPageKey = "INDEX";

        function generateTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            pageKeys.forEach(key => {
                if (key === 'MEMBER' || key === 'PROGRESS') return;

                const btn = document.createElement('button');
                btn.id = "tab-" + key.replace('/', '-');
                btn.className = 'tab';
                btn.innerText = diaryData[key].title;
                btn.onclick = () => switchPage(key);
                container.appendChild(btn);
            });
        }

        function openNotebook() {
            document.getElementById('cover-page').classList.add('hidden');
            document.getElementById('main-notebook').classList.remove('hidden');
            generateTabs();
            switchPage('INDEX');
        }

        function closeNotebook() {
            document.getElementById('main-notebook').classList.add('hidden');
            document.getElementById('cover-page').classList.remove('hidden');
        }

        function switchPage(key) {
            if (!diaryData[key]) return;
            currentPageKey = key;
            
            document.getElementById('left-content').innerHTML = diaryData[key].left;
            document.getElementById('right-content').innerHTML = diaryData[key].right;

            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            
            const tabId = "tab-" + key.replace('/', '-');
            const activeTab = document.getElementById(tabId);
            if (activeTab) {
                activeTab.classList.add('active');
            }

            setTimeout(updateScrollArrows, 50);
        }

        function updateScrollArrows() {
            const sides = ['left', 'right'];
            sides.forEach(side => {
                const pageEl = document.getElementById(`${side}-page`);
                const arrowEl = document.getElementById(`${side}-scroll-arrow`);
                if (pageEl && arrowEl) {
                    const canScroll = pageEl.scrollHeight > pageEl.clientHeight + 12; 
                    const isAtBottom = pageEl.scrollTop + pageEl.clientHeight >= pageEl.scrollHeight - 12;
                    
                    if (canScroll && !isAtBottom) {
                        arrowEl.style.display = 'flex';
                    } else {
                        arrowEl.style.display = 'none';
                    }
                }
            });
        }

        function nextPage() {
            let index = pageKeys.indexOf(currentPageKey);
            if (index < pageKeys.length - 1) {
                switchPage(pageKeys[index + 1]);
            }
        }

        function prevPage() {
            let index = pageKeys.indexOf(currentPageKey);
            if (index > 0) {
                switchPage(pageKeys[index - 1]);
            }
        }
