<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課題研究日記 - 手書き風</title>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500&family=Yomogi&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Kadai.css">
</head>
<body>

    <div class="container">
        <!-- 付箋ナビゲーション（スケッチの上の青い付箋をイメージ） -->
        <nav class="top-tabs">
            <button class="tab-blue" onclick="showPage('cover')">表紙</button>
            <button class="tab-green" onclick="showPage('index')">INDEX</button>
            <button class="tab-pink" onclick="showPage('0424')">4/24</button>
            <button class="tab-yellow" onclick="showPage('0508')">5/8</button>
        </nav>

        <div class="notebook-stack">
            <!-- 背後の紙の重なり表現 -->
            <div class="paper-layer layer1"></div>
            <div class="paper-layer layer2"></div>

            <!-- メインのノート面 -->
            <div id="main-paper" class="main-paper">
                
                <!-- 四隅のマステ -->
                <div class="tape tape-tr"></div>
                <div class="tape tape-bl"></div>
                <div class="tape tape-br"></div>

                <!-- 【表紙の内容】 -->
                <div id="content-cover" class="page-content">
                    <div class="handwriting-area">
                        <p class="txt-school">市川工業の</p>
                        <h1 class="txt-class">E3B</h1>
                        <h2 class="txt-group">7班</h2>
                        <h3 class="txt-title">課題研究</h3>
                        <h3 class="txt-diary">日記</h3>
                        
                        <!-- 赤い手書き矢印 -->
                        <div class="red-arrow" onclick="showPage('index')">
                            <svg viewBox="0 0 100 100" width="100" height="100">
                                <path d="M20,50 L80,50 M60,20 L85,50 L60,80" stroke="#d64d4d" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M20,50 L80,50 M60,20 L85,50 L60,80" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- 【中身の内容】 -->
                <div id="content-inner" class="page-content" style="display:none;">
                    <div class="inner-spread">
                        <div class="inner-page">
                            <div class="line-container" id="diary-body">
                                <!-- ここに日記本文が入る -->
                            </div>
                        </div>
                    </div>
                    <div class="footer-btns">
                        <span class="btn-home" onclick="showPage('cover')">表紙へ</span>
                        <div class="page-nav">
                            <span id="btn-prev">⬅</span>
                            <span id="btn-next">➡</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const pages = {
            '目次': {
                title: '目次',
                body: `
                    <div class="line">INDEX</div>
                    <div class="line clickable" onclick="showPage('0424')">・4/24：はじまり</div>
                    <div class="line clickable" onclick="showPage('0508')">・5/8：調べもの</div>
                    <div class="line"></div><div class="line"></div>
                `
            },
            '0424': {
                title: '4月24日',
                body: `
                    <div class="line">4月24日（水）</div>
                    <div class="line">ここには今日あった出来事や課題、役割などを書き込んでいきます。</div>
                    <div class="line">班長はcherryで班員はfire、slope、sugar、soil、seaの5人です。</div>
                    <div class="line">今日の役割</div>
                    <div class="line">市工についての調べもの：slope、sugar、soil、cherry</div>
                    <div class="line">githubの設定、更新：fire
                    <div class="line">今日やったことは、gemini APIの使い方、gemの作成
                    <div class="line">gemと接続する音声認識と音声発生方法、
                    <div class="line"></div><div class="line"></div>
                `
            },
            '0508': {
                title: '5月8日',
                body: `
                    <div class="line">5月8日（金）</div>
                    <div class="line">作り途中です。</div>
                    <div class="line">まだ待っててください</div>
                    <div class="line"></div><div class="line"></div>
                `
            }
        };

        const order = ['index', '0424', '0508'];

        function showPage(id) {
            const cover = document.getElementById('content-cover');
            const inner = document.getElementById('content-inner');
            
            if(id === 'cover') {
                cover.style.display = 'block';
                inner.style.display = 'none';
                document.getElementById('main-paper').classList.add('is-cover');
            } else {
                cover.style.display = 'none';
                inner.style.display = 'block';
                document.getElementById('main-paper').classList.remove('is-cover');
                document.getElementById('diary-body').innerHTML = pages[id].body;

                const cur = order.indexOf(id);
                document.getElementById('btn-prev').onclick = cur > 0 ? () => showPage(order[cur-1]) : null;
                document.getElementById('btn-next').onclick = cur < order.length-1 ? () => showPage(order[cur+1]) : null;
            }
        }
    </script>
</body>
</html>
