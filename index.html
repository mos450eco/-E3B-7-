```html
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市川工業 E3B 7班 課題研究日記</title>
    <link rel="stylesheet" href="Kadai.css">
    <link rel="preconnect" href="[https://fonts.googleapis.com](https://fonts.googleapis.com)">
    <link rel="preconnect" href="[https://fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
    <link href="[https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Yomogi&display=swap](https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Yomogi&display=swap)" rel="stylesheet">
</head>
<body>

    <div class="notebook-container">
        <nav class="sticky-tabs">
            <button onclick="showPage('page-424')" class="tab blue">4/24</button>
        </nav>

        <div class="notebook">
            <!-- 表紙 -->
            <section id="cover" class="page cover active">
                <div class="cover-content">
                    <p class="school-name">市川工業の</p>
                    <h1 class="class-id">E3B</h1>
                    <p class="group-name">7班</p>
                    <h2 class="project-title">課題研究<br>日記</h2>
                    
                    <button class="next-btn" onclick="flipPage()">
                        <span class="arrow-icon">➔</span>
                    </button>
                </div>
            </section>

            <!-- 日記ページ -->
            <section id="diary-page" class="page diary">
                <div class="paper-spread">
                    <div class="side left-page" id="page-424">
                        <div class="page-header">
                            <span class="date">4/24 の記録</span>
                        </div>
                        <div class="content-area">
                            <p>ここに今日の活動記録を書き込みます。</p>
                            <p>例：今日はみんなで基板の設計について話し合いました。</p>
                            <ul>
                                <li>進捗1：回路図の完成</li>
                                <li>進捗2：部品の発注</li>
                            </ul>
                        </div>
                    </div>

                    <div class="side right-page">
                        <div class="page-header">
                            <span class="date">メモ・感想</span>
                        </div>
                        <div class="content-area">
                            <p>ここに右側の内容を書き込めます。</p>
                        </div>
                    </div>
                </div>
                
                <button class="back-btn" onclick="backToCover()">
                    ⬅ 表紙へ
                </button>
            </section>
        </div>
    </div>

    <script>
        function flipPage() {
            document.getElementById('cover').classList.add('flipped');
            document.getElementById('diary-page').classList.add('active');
            setTimeout(() => {
                document.getElementById('cover').classList.remove('active');
            }, 600);
        }

        function backToCover() {
            document.getElementById('cover').classList.add('active');
            setTimeout(() => {
                document.getElementById('cover').classList.remove('flipped');
                document.getElementById('diary-page').classList.remove('active');
            }, 10);
        }

        function showPage(id) {
            const cover = document.getElementById('cover');
            if (cover.classList.contains('active')) {
                flipPage();
            }
            const target = document.getElementById(id);
            if(target) {
                target.scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
