<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市川工業 E3B 7班 課題研究日記</title>
    <link rel="stylesheet" href="Kadai.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500;900&family=Yomogi&display=swap" rel="stylesheet">
</head>
<body>

    <div class="notebook-container">
        <!-- 上部の付箋ナビ -->
        <nav class="sticky-tabs">
            <button onclick="showSection('cover')" class="tab gray">表紙</button>
            <button onclick="showSection('page-index')" class="tab green">目次</button>
            <button onclick="showSection('page-424')" class="tab blue">4/24</button>
            <button onclick="showSection('page-508')" class="tab pink">5/8</button>
        </nav>

        <div class="notebook">
            
            <!-- ① 表紙ページ -->
            <section id="cover" class="page cover-page active">
                <div class="spine">Campus</div>
                <div class="cover-front">
                    <div class="cover-info">
                        <p class="txt-school">市川工業の</p>
                        <h1 class="txt-class">E3B</h1>
                        <p class="txt-group">7班</p>
                        <h2 class="txt-title">課題研究<br>日記</h2>
                    </div>
                    <!-- 手書き矢印ボタン -->
                    <div class="cover-arrow" onclick="showSection('page-index')">
                        <svg viewBox="0 0 100 100" class="arrow-svg"><path d="M10,50 Q40,45 85,50 M60,20 Q88,48 65,80" stroke="black" stroke-width="8" fill="none" stroke-linecap="round"/></svg>
                    </div>
                </div>
            </section>

            <!-- ② 見開き日記ページ（共通構造） -->
            <section id="main-content" class="page spread-page">
                <div class="spread-container">
                    
                    <!-- 【左ページ：ここを編集してください】 -->
                    <div class="page-half left-side" id="left-content">
                        <!-- JSで中身が入れ替わります -->
                    </div>

                    <!-- 【右ページ：ここを編集してください】 -->
                    <div class="page-half right-side" id="right-content">
                        <!-- JSで中身が入れ替わります -->
                    </div>

                </div>

                <!-- ページ下部のナビゲーション -->
                <div class="bottom-nav">
                    <span class="nav-btn-back" onclick="showSection('cover')">表紙に戻る</span>
                    <div class="nav-arrows">
                        <span class="arrow-icon" onclick="goPrev()">⬅</span>
                        <span class="arrow-icon" onclick="goNext()">➡</span>
                    </div>
                </div>
            </section>

        </div>
    </div>

    <!-- 各ページの内容データ（ここを書き換えればOK！） -->
    <script>
        const pages = {
            'page-index': {
                left: `
                    <h3 class="paper-title">目次 (INDEX)</h3>
                    <div class="line-text" onclick="showSection('page-424')">1. 4月24日の記録</div>
                    <div class="line-text" onclick="showSection('page-508')">2. 5月8日の記録</div>
                    <div class="line-text">3. 未定</div>
                `,
                right: `
                    <h3 class="paper-title">研究メンバー</h3>
                    <div class="line-text">・7班 メンバーA</div>
                    <div class="line-text">・7班 メンバーB</div>
                    <div class="line-text">・7班 メンバーC</div>
                `
            },
            'page-424': {
                left: `
                    <h3 class="paper-title">4/24：研究開始</h3>
                    <div class="line-text">今日はテーマ決めを行いました。</div>
                    <div class="line-text">市川工業の課題について議論。</div>
                    <div class="line-text">面白いアイデアが出ました。</div>
                `,
                right: `
                    <h3 class="paper-title">気づいたこと</h3>
                    <div class="line-text">一人で考えるより、</div>
                    <div class="line-text">班員と話すと進みが早い。</div>
                    <div class="line-text">来週は部品の選定です。</div>
                `
            },
            'page-508': {
                left: `
                    <h3 class="paper-title">5/8：デザイン修正</h3>
                    <div class="line-text">Webサイトの見た目を改善。</div>
                    <div class="line-text">見開きノートの形にしました。</div>
                    <div class="line-text">文字を線のど真ん中に配置！</div>
                `,
                right: `
                    <h3 class="paper-title">今後の予定</h3>
                    <div class="line-text">・GitHubへアップロード</div>
                    <div class="line-text">・内容の肉付け</div>
                    <div class="line-text">・先生への進捗報告</div>
                `
            }
        };

        let currentPageKey = 'page-index';
        const pageKeys = Object.keys(pages);

        function showSection(id) {
            const cover = document.getElementById('cover');
            const main = document.getElementById('main-content');
            
            if (id === 'cover') {
                cover.classList.add('active');
                main.classList.remove('active');
            } else {
                cover.classList.remove('active');
                main.classList.add('active');
                loadPageData(id);
            }
        }

        function loadPageData(id) {
            currentPageKey = id;
            document.getElementById('left-content').innerHTML = pages[id].left;
            document.getElementById('right-content').innerHTML = pages[id].right;
            // 付箋の状態更新
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
        }

        function goNext() {
            let idx = pageKeys.indexOf(currentPageKey);
            if (idx < pageKeys.length - 1) showSection(pageKeys[idx + 1]);
        }

        function goPrev() {
            let idx = pageKeys.indexOf(currentPageKey);
            if (idx > 0) showSection(pageKeys[idx - 1]);
            else showSection('cover');
        }
    </script>
</body>
</html>
