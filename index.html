<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市川工業 E3B 7班 課題研究日記</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500&family=Yomogi&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Kadai.css">
</head>
<body>

    <div id="cover-page" class="notebook-cover">
        <div class="spine"></div> <div class="cover-content">
            <div class="class-tag">E3B 7班</div>
            <h1 class="main-title">課題研究<br>日記</h1>
            <button class="next-arrow-btn" onclick="openNotebook()">➡</button>
        </div>
    </div>

    <div id="main-notebook" class="notebook-body hidden">
        
        <nav class="sticky-tabs">
            <button id="tab-index" class="tab active" onclick="switchPage('INDEX')">目次</button>
            <button id="tab-4-24" class="tab" onclick="switchPage('4/24')">4/24</button>
            <button id="tab-5-8" class="tab" onclick="switchPage('5/8')">5/8</button>
        </nav>

        <div class="pages-container">
            <div class="page left-page">
                <div class="notebook-lines" id="left-content">
                    </div>
            </div>
            <div class="page right-page">
                <div class="notebook-lines" id="right-content">
                    </div>
            </div>
        </div>

        <footer class="notebook-footer">
            <span class="footer-link" onclick="closeNotebook()">🏠 表紙に戻る</span>
            <div class="page-arrows">
                <span class="footer-arrow" onclick="prevPage()">⬅ 前へ</span>
                <span class="footer-arrow" onclick="nextPage()">次へ ➡</span>
            </div>
        </footer>
    </div>

    <script>
        // 💡 日記のデータをここにまとめました！
        // 今後日記を増やすときは、ここを書き換えるだけで目次も自動で増えます。
        const diaryData = {
            "INDEX": {
                left: `
                    <h2 class="page-title">INDEX（目次）</h2>
                    <div class="line-text">※日付を押すとそのページに飛べます</div>
                    <div class="line-text"></div>
                    <div class="line-text"><a href="#" onclick="switchPage('4/24'); return false;">・4月24日の記録</a></div>
                    <div class="line-text"><a href="#" onclick="switchPage('5/8'); return false;">・5月8日の記録</a></div>
                `,
                right: `
                    <div class="line-text"></div>
                    <div class="line-text">【研究テーマ】</div>
                    <div class="line-text">ここに自分たちの課題研究のテーマを</div>
                    <div class="line-text">書いておくとノートっぽくなります。</div>
                `
            },
            "4/24": {
                left: `
                    <h2 class="page-title">4月24日（金）の目標</h2>
                    <div class="line-text">・課題研究のテーマ決めと役割分担</div>
                    <div class="line-text">・先行研究の調査</div>
                    <div class="line-text"></div>
                    <div class="line-text">【メモ】</div>
                    <div class="line-text">まずは何をするかメンバーで話し合った。</div>
                `,
                right: `
                    <h2 class="page-title">本日の成果・気づいたこと</h2>
                    <div class="line-text">みんなでアイデアを出し合って、</div>
                    <div class="line-text">大まかな方向性が決まった。</div>
                    <div class="line-text">次回からは具体的な実験計画を立てる。</div>
                `
            },
            "5/8": {
                left: `
                    <h2 class="page-title">5月8日（金）の目標</h2>
                    <div class="line-text">・必要な材料のリストアップ</div>
                    <div class="line-text">・HTML/CSSの基本勉強</div>
                    <div class="line-text"></div>
                    <div class="line-text">【メモ】</div>
                    <div class="line-text">仮の文章です。後で書き直してね。</div>
                `,
                right: `
                    <h2 class="page-title">本日の成果・気づいたこと</h2>
                    <div class="line-text">5月8日の成果をここに書きます。</div>
                    <div class="line-text">線からはみ出さずに、ど真ん中に</div>
                    <div class="line-text">文字が書けるようになっています！</div>
                `
            }
        };

        let currentPageKey = "INDEX";
        const pageKeys = Object.keys(diaryData);

        function openNotebook() {
            document.getElementById('cover-page').classList.add('hidden');
            document.getElementById('main-notebook').classList.remove('hidden');
            switchPage('INDEX');
        }

        function closeNotebook() {
            document.getElementById('main-notebook').classList.add('hidden');
            document.getElementById('cover-page').classList.remove('hidden');
        }

        function switchPage(key) {
            if (!diaryData[key]) return;
            currentPageKey = key;
            
            // ページ内容の入れ替え
            document.getElementById('left-content').innerHTML = diaryData[key].left;
            document.getElementById('right-content').innerHTML = diaryData[key].right;

            // 付箋の見た目をアクティブ（手前に出す）にする
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            
            let tabId = "tab-" + key.replace('/', '-');
            let activeTab = document.getElementById(tabId) || document.getElementById('tab-index');
            if (activeTab) activeTab.classList.add('active');
        }

        function nextPage() {
            let index = pageKeys.indexOf(currentPageKey);
            if (index < pageKeys.length - 1) {
                switchPage(pageKeys[index + 1]);
            }
        }

        function prevPage() {
            let index = pageKeys.indexOf(currentPageKey);
            if (index > 0) {
                switchPage(pageKeys[index - 1]);
            }
        }
    </script>
</body>
</html>
