
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課題研究ポートフォリオ</title>
    <!-- 手書き風フォントの読み込み -->
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500&family=Yomogi&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Kadai.css">
</head>
<body>

    <!-- ノート全体のコンテナ -->
    <div id="notebook-container">
        
        <!-- 付箋（タブ）ナビゲーション -->
        <nav class="sticky-tabs" id="nav-tabs">
            <button onclick="showPage('cover')">表紙</button>
            <button onclick="showPage('index')">目次</button>
            <button onclick="showPage('0424')">4/24</button>
            <button onclick="showPage('0426')">4/26</button>
            <button onclick="showPage('0508')" class="active">5/8</button>
        </nav>

        <div id="notebook" class="notebook">
            
            <!-- 【表紙ページ】 -->
            <div id="page-cover" class="page-content active">
                <div class="cover-design">
                    <div class="spine"></div> <!-- 紫の背表紙 -->
                    <div class="cover-main">
                        <div class="class-info">E3B 7班</div>
                        <h1 class="main-title">課題研究<br>日記</h1>
                        <div class="author-name">市川工業</div>
                        <!-- 手書き風矢印 -->
                        <div class="next-arrow" onclick="showPage('index')">
                            <svg width="80" height="80" viewBox="0 0 100 100">
                                <path d="M20 50 L80 50 M60 30 L80 50 L60 70" stroke="black" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 【中身のページ共通構造】 -->
            <div id="page-inner" class="page-content" style="display:none;">
                <div class="spread">
                    <!-- 左ページ -->
                    <div class="sheet left-page">
                        <div class="page-number" id="left-num"></div>
                        <div class="lines" id="left-content">
                            <!-- ここに左側の内容が入ります -->
                        </div>
                    </div>
                    <!-- 右ページ -->
                    <div class="sheet right-page">
                        <div class="page-number" id="right-num"></div>
                        <div class="lines" id="right-content">
                            <!-- ここに右側の内容が入ります -->
                        </div>
                    </div>
                </div>

                <!-- ページ下部のナビゲーション -->
                <div class="footer-nav">
                    <span class="back-link" onclick="showPage('cover')">表紙に戻る</span>
                    <div class="page-arrows">
                        <span class="arrow-btn" id="prev-btn">⬅︎</span>
                        <span class="arrow-btn" id="next-btn">➡︎</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- ここで日記の内容を編集できます！ ---
        const diaryData = {
            'index': {
                left: `
                    <div class="line-text title">INDEX（目次）</div>
                    <div class="line-text" onclick="showPage('0424')">・4月24日：研究テーマの決定</div>
                    <div class="line-text" onclick="showPage('0426')">・4月26日：先行研究の調査</div>
                    <div class="line-text" onclick="showPage('0508')">・5月08日：ポートフォリオ作成開始</div>
                    <div class="line-text"></div>
                    <div class="line-text"></div>
                `,
                right: `
                    <div class="line-text"></div>
                    <div class="line-text"></div>
                    <div class="line-text"></div>
                    <div class="line-text"></div>
                    <div class="line-text"></div>
                    <div class="line-text"></div>
                `
            },
            '0424': {
                left: `
                    <div class="line-text title">4月24日（水）</div>
                    <div class="line-text">今日は最初の課題研究の時間。</div>
                    <div class="line-text">7班のメンバーで何をするか話し合った。</div>
                    <div class="line-text"></div>
                `,
                right: `
                    <div class="line-text">【メモ】</div>
                    <div class="line-text">・Webサイト制作に決定</div>
                    <div class="line-text">・HTML/CSSを勉強する</div>
                    <div class="line-text"></div>
                `
            },
            '0426': {
                left: `
                    <div class="line-text title">4月26日（金）</div>
                    <div class="line-text">図書館で資料を探した。</div>
                    <div class="line-text">可愛いデザインの参考書を見つけた。</div>
                `,
                right: `
                    <div class="line-text">【やること】</div>
                    <div class="line-text">・GitHubのアカウント作成</div>
                    <div class="line-text">・READMEの書き方を調べる</div>
                `
            },
            '0508': {
                left: `
                    <div class="line-text title">5月8日（水）</div>
                    <div class="line-text">ポートフォリオの作成を開始！</div>
                    <div class="line-text">AIと相談しながらコードを書いている。</div>
                `,
                right: `
                    <div class="line-text">【今日の進捗】</div>
                    <div class="line-text">・キャンパスノート風のデザイン完成</div>
                    <div class="line-text">・付箋の連動ができるようになった</div>
                `
            }
        };

        const pageOrder = ['index', '0424', '0426', '0508'];

        function showPage(pageId) {
            const cover = document.getElementById('page-cover');
            const inner = document.getElementById('page-inner');
            const tabs = document.querySelectorAll('.sticky-tabs button');

            // 付箋のアクティブ状態を更新
            tabs.forEach(btn => {
                btn.classList.remove('active');
                if(btn.getAttribute('onclick').includes(pageId)) btn.classList.add('active');
            });

            if (pageId === 'cover') {
                cover.style.display = 'block';
                inner.style.display = 'none';
            } else {
                cover.style.display = 'none';
                inner.style.display = 'block';
                
                // 内容を書き換え
                document.getElementById('left-content').innerHTML = diaryData[pageId].left;
                document.getElementById('right-content').innerHTML = diaryData[pageId].right;

                // 前後の矢印設定
                const idx = pageOrder.indexOf(pageId);
                const prevBtn = document.getElementById('prev-btn');
                const nextBtn = document.getElementById('next-btn');

                if(idx > 0) {
                    prevBtn.style.visibility = 'visible';
                    prevBtn.onclick = () => showPage(pageOrder[idx-1]);
                } else {
                    prevBtn.style.visibility = 'hidden';
                }

                if(idx < pageOrder.length - 1) {
                    nextBtn.style.visibility = 'visible';
                    nextBtn.onclick = () => showPage(pageOrder[idx+1]);
                } else {
                    nextBtn.style.visibility = 'hidden';
                }
            }
        }
    </script>
</body>
</html>
